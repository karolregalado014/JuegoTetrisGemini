<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTetris AutoStart Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --panel-color: #111;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --text-glow: 0 0 10px rgba(0, 243, 255, 0.7);
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            background: #000;
            position: relative;
        }

        canvas {
            display: block;
            /* Rejilla de fondo sutil */
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hud-panel {
            background: var(--panel-color);
            border-left: 2px solid var(--neon-pink);
            padding: 20px;
            min-width: 220px;
        }

        .neon-text {
            color: #fff;
            text-shadow: var(--text-glow);
            text-transform: uppercase;
        }

        .btn-cyber {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-shadow: var(--text-glow);
            transition: 0.3s;
        }

        .btn-cyber:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .controls-hint p {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }

        /* Mobile Controls */
        .touch-controls {
            display: none;
        }

        @media (max-width: 992px) {
            .touch-controls {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                margin-top: 20px;
                width: 100%;
                max-width: 300px;
            }
            .hud-panel {
                border-left: none;
                border-top: 2px solid var(--neon-pink);
                width: 100%;
                max-width: 300px;
            }
            .row {
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="row justify-content-center g-0 align-items-stretch">
        <div class="col-auto d-flex justify-content-center">
            <div class="game-container">
                <canvas id="tetris" width="300" height="600"></canvas>
            </div>
        </div>

        <div class="col-auto hud-panel d-flex flex-column justify-content-between">
            <div>
                <h3 class="neon-text mb-4 text-center"><i class="fas fa-microchip"></i> CYBER<br>TETRIS</h3>
                
                <div class="mb-3 text-center">
                    <small class="text-muted">PUNTUACIÓN</small>
                    <div id="score" class="h2 neon-text">0</div>
                </div>

                <div class="mb-3 text-center">
                    <small class="text-muted">TIEMPO</small>
                    <div id="timer" class="h2 text-warning">02:00</div>
                </div>

                <hr class="border-secondary">

                <div class="settings mb-4">
                    <label class="form-label small text-muted">VELOCIDAD</label>
                    <select id="difficulty" class="form-select form-select-sm bg-dark text-white border-secondary mb-2">
                        <option value="1000">Lento</option>
                        <option value="600" selected>Normal</option>
                        <option value="200">Rápido</option>
                    </select>

                    <label class="form-label small text-muted">PALETA</label>
                    <select id="palette" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="neon">Neón</option>
                        <option value="retro">Retro</option>
                    </select>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button id="start-btn" class="btn btn-cyber py-2">PAUSAR</button>
                <div class="controls-hint mt-3 d-none d-lg-block">
                    <p><i class="fas fa-keyboard"></i> Flechas: Mover/Abajo</p>
                    <p><i class="fas fa-sync"></i> Z / X: Rotar</p>
                    <p><i class="fas fa-arrow-down"></i> Espacio: Caída Total</p>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center w-100">
        <div class="touch-controls">
            <button class="btn btn-cyber col-3" id="touch-left"><i class="fas fa-arrow-left"></i></button>
            <button class="btn btn-cyber col-3" id="touch-rotate"><i class="fas fa-sync"></i></button>
            <button class="btn btn-cyber col-3" id="touch-right"><i class="fas fa-arrow-right"></i></button>
            <button class="btn btn-cyber w-100 mt-2" id="touch-drop">CAÍDA RÁPIDA</button>
        </div>
    </div>
</div>

<script>
/** * LÓGICA DEL JUEGO - JAVASCRIPT PURO 
 */
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const difficultySelect = document.getElementById('difficulty');
const paletteSelect = document.getElementById('palette');

// Escalar todo 30 veces (bloques de 1x1 en lógica son 30x30px en pantalla)
context.scale(30, 30); 

// Definición de Piezas (Matrices)
function createPiece(type) {
    if (type === 'I') return [,,,];
    if (type === 'L') return [,,];
    if (type === 'J') return [,,];
    if (type === 'O') return [,];
    if (type === 'Z') return [,,];
    if (type === 'S') return [,,];
    if (type === 'T') return [,,];
}

// Colores
const colors = {
    neon: [null, '#00f3ff', '#ff00ff', '#f3f315', '#00ff00', '#ff0055', '#9d00ff', '#ffffff'],
    retro: [null, '#8bac0f', '#8bac0f', '#8bac0f', '#8bac0f', '#8bac0f', '#8bac0f', '#8bac0f'] // Monocromo GameBoy
};

// --- Funciones Core de Dibujo y Lógica ---

function draw() {
    // Limpiar canvas con negro puro
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar bloques ya fijados en la arena
    drawMatrix(arena, {x: 0, y: 0});
    // Dibujar pieza del jugador en movimiento
    drawMatrix(player.matrix, player.pos);
}

function drawMatrix(matrix, offset) {
    const currentPalette = paletteSelect.value;
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                // Efecto de Brillo Neón
                if(currentPalette === 'neon') {
                    context.shadowBlur = 10;
                    context.shadowColor = colors[currentPalette][value];
                } else {
                    context.shadowBlur = 0;
                }
                
                context.fillStyle = colors[currentPalette][value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                
                // Borde interno para separar bloques
                context.shadowBlur = 0;
                context.strokeStyle = 'rgba(0,0,0,0.5)';
                context.lineWidth = 0.05;
                context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

// Limpieza de líneas completadas
function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer; // Línea no completada
            }
        }
        // Línea llena encontrada: eliminarla y añadir una vacía arriba
        const row = arena.splice(y, 1).fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 100;
        rowCount *= 2; // Combo por múltiples líneas
    }
}

// Detección de colisiones
function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            // Si el bloque de la pieza no es vacío Y
            // (toca el fondo O toca un bloque ocupado en la arena)
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function createArena(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

// Fijar pieza a la arena
function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

// --- Acciones del Jugador ---

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        // Hubo colisión al bajar, retroceder, fijar y generar nueva
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

// Generar nueva pieza aleatoria arriba
function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    // Centrar horizontalmente
    player.pos.x = (arena.length / 2 | 0) - (player.matrix.length / 2 | 0);
    
    // Game Over inmediato si colisiona al spawnear
    if (collide(arena, player)) {
        gameRunning = false;
        alert("GAME OVER. Sesión terminada.\nPuntuación: " + player.score);
        // Reiniciar todo automáticamente tras el alert
        arena.forEach(row => row.fill(0));
        player.score = 0;
        gameTime = 120;
        updateScore();
        gameRunning = true; 
        playerReset();
    }
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    // Empujar la pieza lateralmente si al rotar colisiona con pared
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix.length) {
            // Rotación imposible, deshacer
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

// Rotación de matriz
function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function updateScore() {
    scoreElement.innerText = player.score;
}

// --- Loop Principal ---

let dropCounter = 0;
let lastTime = 0;
let gameRunning = true; // AHORA EMPIEZA EN TRUE

function update(time = 0) {
    if (!gameRunning) return;
    
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    // Caída automática basada en la dificultad seleccionada
    if (dropCounter > parseInt(difficultySelect.value)) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

// --- Temporizador y Estado ---

let gameTime = 120; // 2 minutos
let timerInterval;

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!gameRunning) return;
        gameTime--;
        
        let mins = Math.floor(gameTime / 60);
        let secs = gameTime % 60;
        timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        if (gameTime <= 0) {
            gameRunning = false;
            clearInterval(timerInterval);
            alert("TIEMPO AGOTADO. Conexión perdida.\nScore final: " + player.score);
            location.reload(); // Recargar página para reiniciar
        }
    }, 1000);
}

// --- Manejo de Eventos (Controles) ---

// 1. Teclado
document.addEventListener('keydown', event => {
    if (!gameRunning) return;
    
    if (event.keyCode === 37) playerMove(-1);      // Flecha Izq
    else if (event.keyCode === 39) playerMove(1);   // Flecha Der
    else if (event.keyCode === 40) playerDrop();   // Flecha Abajo
    else if (event.keyCode === 90) playerRotate(-1); // Z (Rotar Anti)
    else if (event.keyCode === 88) playerRotate(1);  // X (Rotar Hora)
    else if (event.keyCode === 32) {                // Espacio (Caída Total)
        event.preventDefault(); // Evitar scroll
        while(!collide(arena, player)) { player.pos.y++; }
        player.pos.y--; // Subir uno tras colisión
        playerDrop();   // Forzar merge
    }
});

// 2. Mouse (Arrastre lateral y Click)
let isDragging = false;
let startX = 0;
let lastGridX = 0;

canvas.addEventListener('mousedown', e => {
    if(!gameRunning) return;
    isDragging = true;
    startX = e.clientX;
    const rect = canvas.getBoundingClientRect();
    lastGridX = Math.floor((e.clientX - rect.left) / 30);
});

window.addEventListener('mouseup', e => {
    if(!gameRunning) { isDragging = false; return; }
    // Si apenas se movió el mouse, se considera click para rotar
    if (isDragging && Math.abs(e.clientX - startX) < 10) {
        playerRotate(1);
    }
    isDragging = false;
});

canvas.addEventListener('mousemove', e => {
    if (!isDragging || !gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    const currentGridX = Math.floor((e.clientX - rect.left) / 30);
    
    // Mover pieza solo si el mouse cambió de columna en la rejilla
    if (currentGridX !== lastGridX) {
        playerMove(currentGridX > lastGridX ? 1 : -1);
        lastGridX = currentGridX;
    }
});

// 3. Táctil (Botones UI)
document.getElementById('touch-left').onclick = () => { if(gameRunning) playerMove(-1); };
document.getElementById('touch-right').onclick = () => { if(gameRunning) playerMove(1); };
document.getElementById('touch-rotate').onclick = () => { if(gameRunning) playerRotate(1); };
document.getElementById('touch-drop').onclick = () => {
    if(!gameRunning) return;
    while(!collide(arena, player)) { player.pos.y++; }
    player.pos.y--;
    playerDrop();
};

// 4. Botón Pausa/Reanudar
document.getElementById('start-btn').onclick = () => {
    if (gameRunning) {
        gameRunning = false;
        document.getElementById('start-btn').innerText = "REANUDAR";
    } else {
        gameRunning = true;
        document.getElementById('start-btn').innerText = "PAUSAR";
        update(); // Reiniciar loop
    }
};

// --- Inicialización ---

// Definición estado inicial jugador y arena
const arena = createArena(10, 20);
const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0,
};

// INICIO AUTOMÁTICO
playerReset();
updateScore();
update();      // Arranca el loop de renderizado
startTimer();  // Arranca la cuenta atrás

</script>

</body>
</html>
